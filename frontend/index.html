<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Google Search Console verification ── -->
    <meta name="google-site-verification" content="0gqNRuMs1uDrizLqOCr0KFG6C4F1X3dPgjiBhzqKqpk" />

    <!-- ── Primary SEO ── -->
    <title>BriefAI — AI-Powered News Briefings</title>
    <meta name="description" content="BriefAI delivers AI-analyzed news briefings across AI & Tech, Politics, Wars & Conflicts, and Business. Get bias analysis, multiple global perspectives, and 7-day story timelines — powered by Claude AI and the New York Times." />
    <meta name="keywords" content="AI news, news briefing, artificial intelligence news, bias analysis, global news, news perspectives, tech news, politics news, business news, BriefAI" />
    <meta name="author" content="BriefAI" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.briefai.news" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp previews) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BriefAI" />
    <meta property="og:title" content="BriefAI — AI-Powered News Briefings" />
    <meta property="og:description" content="AI-analyzed news with bias ratings, global perspectives, and story timelines. Powered by Claude AI + New York Times." />
    <meta property="og:url" content="https://www.briefai.news" />
    <meta property="og:image" content="https://www.briefai.news/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter / X Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BriefAI — AI-Powered News Briefings" />
    <meta name="twitter:description" content="AI-analyzed news with bias ratings, global perspectives, and story timelines. Powered by Claude AI + New York Times." />
    <meta name="twitter:image" content="https://www.briefai.news/og-image.png" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Theme color (browser tab / mobile bar) ── -->
    <meta name="theme-color" content="#E63C26" />

    <!-- ── Structured Data (Google rich results) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "BriefAI",
      "url": "https://www.briefai.news",
      "description": "AI-powered news briefings with bias analysis, global perspectives, and story timelines.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.briefai.news/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
